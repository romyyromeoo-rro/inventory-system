version: "3.9"

services:
  api:
    build: .
    container_name: inventory_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: inventory_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    build: .
    container_name: inventory_worker
    command: python run_worker.py
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  scheduler:
    build: .
    container_name: inventory_scheduler
    command: python run_scheduler.py
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  recovery:
    build: .
    container_name: inventory_recovery
    command: python run_recovery.py
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
